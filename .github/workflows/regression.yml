name: Regression tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------ #
  # Static regression lints — no DB, no install. Fast first signal.    #
  # ------------------------------------------------------------------ #
  static:
    name: Static regression lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Smarty 5 JS-template escaping (alias [+] button regression)
        run: bash tests/lint-template-escaping.sh

      - name: ZF1 surface must not grow (Phase 0 guard, docs/ZF1-REMOVAL.md)
        run: bash tests/lint-no-new-zend.sh

  # ------------------------------------------------------------------ #
  # Framework-free service unit tests (Phase 1 of docs/ZF1-REMOVAL.md).#
  # No DB: the services depend on the minimal ObjectManager port and   #
  # are exercised against an in-memory fake + plain-PHP entities.      #
  # ------------------------------------------------------------------ #
  unit:
    name: Service unit tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: ctype, dom, intl, json, mbstring
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-dev

      - name: ViMbAdmin_Service_Domain
        run: php tests/test-service-domain.php

      - name: ViMbAdmin_Service_Admin
        run: php tests/test-service-admin.php

  # ------------------------------------------------------------------ #
  # Dependency + cache wiring — proves a composer bump (symfony/cache, #
  # doctrine/orm) does not break the Doctrine cache layer at runtime.  #
  # Runs on the two PHP versions that matter: 8.4 (floor) + 8.5 (prod).#
  # ------------------------------------------------------------------ #
  cache-wiring:
    name: Cache wiring (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: apcu, ctype, dom, intl, json, mbstring, pdo, pdo_mysql, sodium
          ini-values: apc.enable_cli=1
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-dev

      - name: Assert doctrine/orm stayed on 2.x (ORM 3 removes APIs we use)
        run: |
          ver=$(composer show doctrine/orm --no-interaction 2>/dev/null \
                | awk '/^versions/ {print $4}')
          echo "doctrine/orm = $ver"
          case "$ver" in
            2.*|v2.*) echo "OK: ORM 2.x" ;;
            *) echo "::error::doctrine/orm is $ver — ORM 3 removes EntityManager::create / set*CacheImpl that this codebase relies on"; exit 1 ;;
          esac

      - name: Cache + ORM bootstrap smoke
        run: php -d apc.enable_cli=1 tests/test-cache-bootstrap.php

  # ------------------------------------------------------------------ #
  # Schema drift — loads the shipped SQL into a real MariaDB and proves #
  # the XML mappings produce NO pending changes (phantom-ALTER guard).  #
  # ------------------------------------------------------------------ #
  schema-drift:
    name: Schema has no phantom pending changes
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: ci
          MARIADB_DATABASE: vimbadmin
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=5s --health-retries=20
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          extensions: ctype, dom, intl, json, mbstring, pdo, pdo_mysql, sodium
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-dev

      - name: Wait for MariaDB
        run: |
          for i in $(seq 1 30); do
            if mysql -h127.0.0.1 -P3306 -uroot -pci -e 'SELECT 1' >/dev/null 2>&1; then
              echo "MariaDB up"; break
            fi
            sleep 2
          done

      # Step 1: build schema from the XML mappings and assert the mappings are
      # self-consistent (schema-tool --force leaves nothing pending).
      - name: Build schema from mappings — assert no pending diff
        env: { DB_HOST: 127.0.0.1, DB_PORT: '3306', DB_NAME: vimbadmin, DB_USER: root, DB_PASS: ci }
        run: php tests/test-schema-no-pending.php

      # Step 2: layer the shipped fork SQL (FKs / collations / unique index /
      # non-mappable bits) via the mysql client, which handles the file's
      # PREPARE/EXECUTE guard blocks.
      - name: Apply shipped fork migration SQL
        run: mysql -h127.0.0.1 -P3306 -uroot -pci vimbadmin < contrib/migrations/2026-06-fork-schema.sql

      # Step 3: re-diff WITHOUT recreating — proves the fork SQL did not push the
      # DB out of sync with the mappings (the phantom-ALTER regression).
      - name: After fork SQL — assert still no pending diff
        env: { DB_HOST: 127.0.0.1, DB_PORT: '3306', DB_NAME: vimbadmin, DB_USER: root, DB_PASS: ci, SKIP_CREATE: '1' }
        run: php tests/test-schema-no-pending.php

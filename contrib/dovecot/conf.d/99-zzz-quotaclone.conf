# =============================================================================
#  quota_clone — real-time quota usage into a DEDICATED dovecot_quota table,
#  which an AFTER INSERT/UPDATE trigger mirrors into ViMbAdmin
#  mailbox.maildir_size + size_at. Replaces the 1x/day update_mailbox_size.pl
#  du-scan (set USE_VIMBADMIN=no).
#
#  Why a separate table: quota_clone's dict-sql does INSERT..ON DUPLICATE KEY
#  UPDATE; writing straight into mailbox fails on its NOT NULL columns
#  (password/quota/local_part have no default). dovecot_quota is clean
#  (username PK, bytes, messages) so the upsert works; the trigger does the
#  mailbox sync. ViMbAdmin's archive "Size" reads dovecot_quota.bytes.
# =============================================================================

mail_plugins {
  quota_clone = yes
}

dict_server {
  dict vimbadmin {
    driver = sql
    sql_driver = mysql
    mysql DB_HOST {
      user = DB_USER
      password = DB_PASSWORD
      dbname = DB_NAME
    }
    dict_map priv/quota/storage {
      sql_table = dovecot_quota
      username_field = username
      value_field bytes {
      }
    }
    dict_map priv/quota/messages {
      sql_table = dovecot_quota
      username_field = username
      value_field messages {
      }
    }
  }
}

quota_clone {
  dict proxy {
    name = vimbadmin
  }
}

# Mail procs run as vmail (5000); the default dict socket is root:dovecot 0660
# and vmail is not in group dovecot -> "net_connect_unix(/run/dovecot/dict):
# Permission denied". Hand the socket to vmail.
service dict {
  unix_listener dict {
    user = vmail
    group = vmail
    mode = 0600
  }
}

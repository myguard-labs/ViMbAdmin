# =============================================================================
#  doveadm HTTP API  (internal-only) — drives the ViMbAdmin mailbox-task queue
#
#  ViMbAdmin calls these over the internal docker network to run
#  repair/optimize/archive/delete (force-resync, index, purge, backup,
#  mailbox delete, quota recalc, sync/restore) WITHOUT sharing the mail store.
#
#  SECURITY: keep the container on an internal network only and NEVER publish
#  port 8081 to the host — the docker network is the perimeter. Layer 2 is the
#  X-Dovecot-API bearer key (Dovecot is fail-closed without it). Do NOT add a
#  `ports:` entry for 8081 in docker-compose.yml.
#  Endpoint: POST http://<dovecot-host>:8081/doveadm/v1
# =============================================================================
service doveadm {
  inet_listener http {
    port = 8081
  }
}

# Generate a strong key (e.g. `openssl rand -hex 32`) and set the SAME value in
# ViMbAdmin's application.ini doveadm.http.api_key.
doveadm_api_key = CHANGEME_openssl_rand_hex_32

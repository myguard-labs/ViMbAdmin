# =============================================================================
#  last_login — record each user's last successful login into a DEDICATED
#  dovecot_last_login table (username PK, last_login = unix timestamp seconds),
#  which ViMbAdmin reads to show "Last login" in the mailbox overview.
#
#  Reuses the `vimbadmin` SQL dict from 99-zzz-quotaclone.conf (the MySQL
#  credentials live there); here we only add one more dict_map.
#
#  The plugin prepends the shared/ namespace, so the effective key is
#  `shared/last-login/<user>` -> pattern `shared/last-login/$user`, with $user
#  bound to the table's username column via a key_field.
#  Ref: https://doc.dovecot.org/2.4.3/core/plugins/last_login.html
# =============================================================================

# Enable last_login ONLY for the interactive login protocols (imap, pop3), NOT
# globally: the plugin hooks mail_user_created, which ALSO fires for every
# doveadm action (quota recalc, force-resync, the ViMbAdmin queue tasks) and
# would record those as a "login". Scoping to imap/pop3 means only a real
# client login updates the timestamp.
protocol imap {
  mail_plugins {
    last_login = yes
  }
}
protocol pop3 {
  mail_plugins {
    last_login = yes
  }
}

last_login {
  dict proxy {
    name = vimbadmin
  }
  key = last-login/%{user}
  precision = s
}

dict_server {
  dict vimbadmin {
    dict_map shared/last-login/$user {
      sql_table = dovecot_last_login
      value_field last_login {
        type = uint
      }
      key_field username {
        value = $user
      }
    }
  }
}

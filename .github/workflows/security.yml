name: Security scan (SAST)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly re-scan so new Semgrep rules catch latent issues.
    - cron: '27 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # upload SARIF to the GitHub Security tab

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    # CodeQL has no PHP support; Semgrep is the SAST engine for this codebase.
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/php \
            --config p/security-audit \
            --config p/secrets \
            --sarif --output semgrep.sarif \
            --error || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

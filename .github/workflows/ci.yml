name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: PHP syntax lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']   # 8.4 = composer floor, 8.5 = deployed container runtime
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate composer.json / composer.lock
        run: composer validate --strict

      - name: PHP syntax check
        run: |
          find application library public bin -name '*.php' -print0 \
            | xargs -0 -r -n1 -P"$(nproc)" php -l > /dev/null

  audit:
    name: Dependency security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      # --locked reads composer.lock directly (no composer install needed in
      # this job); abandoned packages are ignored via the composer.json
      # `config.audit.abandoned` setting.
      - name: composer audit
        run: composer audit --locked

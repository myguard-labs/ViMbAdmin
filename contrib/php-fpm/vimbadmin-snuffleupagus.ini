; Enable Snuffleupagus for the ViMbAdmin FPM pool.
;
; Install as /etc/php/<ver>/fpm/conf.d/zz-vimbadmin-snuffleupagus.ini
; (the "zz-" prefix makes it load last, after the extension itself).
;
; The rulebook is the audited, FPM-validated profile shipped in the repo at
; snuffleupagus/vimbadmin-strict.list -- copy it to the path below and
; generate a UNIQUE secret_key per host:
;
;   php -r 'echo bin2hex(random_bytes(32)), "\n";'
;   sed -i "s/CHANGE-ME-PER-DEPLOYMENT-0*/<that value>/" \
;       /etc/php/<ver>/php-snuffleupagus/vimbadmin-strict.list

extension = snuffleupagus.so
sp.configuration_file = /etc/php/8.5/php-snuffleupagus/vimbadmin-strict.list

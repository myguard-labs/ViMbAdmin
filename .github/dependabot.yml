version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Security advisories are picked up automatically; this also surfaces
    # routine version bumps for the direct deps (doctrine/orm, smarty/smarty,
    # robthree/twofactorauth, bacon/bacon-qr-code, symfony/cache).
    # doctrine/orm 3.x removes ORM2-only APIs this codebase still relies on
    # (EntityManager::create, set*CacheImpl, Common\ClassLoader, old XmlDriver
    # ctor). Block major bumps until the ORM2->3 migration is done; minor and
    # patch updates still flow.
    ignore:
      - dependency-name: "doctrine/orm"
        update-types: ["version-update:semver-major"]
    groups:
      php-deps:
        patterns:
          - "*"

  # Keep the GitHub Actions used by the CI / SAST / regression workflows current
  # — security patches to checkout/setup-php/codeql-action land here, and the
  # bumps move the `uses:` refs forward (toward pinned digests) instead of
  # sitting on a stale mutable tag.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"

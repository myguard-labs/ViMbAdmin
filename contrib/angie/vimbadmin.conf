# =====================================================================
#  Angie / nginx vhost for ViMbAdmin  --  hardened + positive security
# =====================================================================
#
#  Install as /etc/angie/sites-available/vimbadmin and symlink into
#  sites-enabled/ (or drop in http.d/). Pairs with the FPM pool in
#  contrib/php-fpm/vimbadmin.conf (socket: /run/php/vimbadmin-fpm.sock).
#
#  Assumes the ViMbAdmin checkout lives at /opt/vimbadmin with the public
#  docroot at /opt/vimbadmin/public.
#
#  This vhost is the PRIMARY edge defence and needs no extra modules. It
#  implements positive security natively: only known methods, routes and
#  argument names reach PHP; everything else is denied at the edge, cheaply.
#  (An optional ModSecurity/CRS plugin for payload-signature scanning of the
#  values you DO allow lives at github.com/eilandert/vimbadmin-crs-plugin --
#  belt and braces, only if you already run libmodsecurity.)
# =====================================================================

# =====================================================================
#  http{} context  --  put these maps in http{} (here for reference).
#  They classify each request once, cheaply, into a flag.
# =====================================================================

# ---- 1) Method allowlist -------------------------------------------
# ViMbAdmin only ever uses GET/HEAD/POST. Map anything else to a flag.
map $request_method $vimb_bad_method {
    default       1;
    "GET"         0;
    "HEAD"        0;
    "POST"        0;
}

# ---- 2) Route allowlist --------------------------------------------
# Only ViMbAdmin's real controllers (and the front controller + static)
# are valid. $uri is already normalised/decoded by Angie. A miss = 1.
map $uri $vimb_bad_route {
    default                                              1;
    "~^/$"                                               0;
    "~^/index\.php$"                                     0;
    # Known controllers, optional /action, then ZF1 param-pairs
    # (/key/value/key/value...). Keys are lowercase; values are ids /
    # usernames / domains. e.g. /domain/admins/did/1, /admin/domains/aid/2.
    "~^/(?:additionalinfo|admin|alias|archive|auth|domain|error|exportsettings|index|log|mailbox|mcp)(?:/[a-z-]+(?:/[A-Za-z0-9._@%+-]+)*)?/?$" 0;
    # static assets
    "~*\.(?:css|js|png|jpe?g|gif|ico|svg|woff2?|ttf|eot|map)$" 0;
    # ACME + well-known
    "~^/\.well-known/"                                   0;
}

# ---- 3) Argument-name allowlist ------------------------------------
# Derived by harvesting every form field + GET param from the app. If the
# query/body carries an arg NAME outside this set, flag it. (Angie exposes
# only the names cheaply via $args for GET; POST bodies are constrained by
# the body-size caps + the app's own CSRF/validation. This catches GET-based
# parameter smuggling and scanner probes.)
map $args $vimb_bad_args {
    default                                              1;   # unknown key -> block
    ""                                                  0;   # no args = fine (literal empty)
    # Every arg name must be in the ViMbAdmin allowlist. A single unknown key
    # makes the whole query fail the match and fall through to default(1).
    "~^(?:(?:csrf|csrf_token|code|op|verify|captchaid|captchatext|submit|login|action|aid|did|mid|alid|arid|unset|send|ima|delete_files|debug|verbose|query|username|password|current_password|new_password|confirm_new_password|salt|rememberme|domain|description|transport|backupmx|active|max_aliases|max_mailboxes|max_quota|quota|local_part|name|email|type|alt_email|welcome_email|cc_welcome_email|requestnewimage|admin|super|goto|address|page|csrf_token)(?:=[^&]*)?)(?:&(?:csrf|csrf_token|code|op|verify|captchaid|captchatext|submit|login|action|aid|did|mid|alid|arid|unset|send|ima|delete_files|debug|verbose|query|username|password|current_password|new_password|confirm_new_password|salt|rememberme|domain|description|transport|backupmx|active|max_aliases|max_mailboxes|max_quota|quota|local_part|name|email|type|alt_email|welcome_email|cc_welcome_email|requestnewimage|admin|super|goto|address|page|csrf_token)(?:=[^&]*)?)*$" 0;
}

# ---- 4) Scanner / bad-bot user-agent deny --------------------------
map $http_user_agent $vimb_bad_ua {
    default                       0;
    ""                            1;                          # empty UA
    "~*(?:nikto|sqlmap|nmap|masscan|nessus|acunetix|nuclei|wpscan|dirbuster|gobuster|feroxbuster|httrack|zgrab|semrush|ahrefsbot|mj12bot|petalbot)" 1;
}

# ---- HTTP -> HTTPS redirect -----------------------------------------
server {
    listen      80;
    listen      [::]:80;
    server_name vimbadmin.example.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type "text/plain";
    }
    location / { return 301 https://$host$request_uri; }
}

# ---- HTTPS ----------------------------------------------------------
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name vimbadmin.example.com;

    root  /opt/vimbadmin/public;
    index index.php;

    # ---- TLS --------------------------------------------------------
    ssl_certificate     /etc/ssl/vimbadmin/fullchain.pem;
    ssl_certificate_key /etc/ssl/vimbadmin/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305";
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:vimb_ssl:10m;
    ssl_session_tickets off;

    # ---- real client IP behind a TLS-terminating proxy / LB ---------
    # If another proxy or load balancer sits in front of this vhost, make
    # REMOTE_ADDR the real client so the app's brute-force + MCP IP checks are
    # accurate. Set to YOUR upstream(s); requires the realip module. If you
    # don't run an extra front proxy (this IS the TLS edge), leave it off.
    #real_ip_header    X-Forwarded-For;
    #real_ip_recursive on;
    #set_real_ip_from  10.0.0.0/8;
    #set_real_ip_from  172.16.0.0/12;
    #set_real_ip_from  192.168.0.0/16;
    # (App-side fallback when realip isn't used: trustedproxy.mode in
    #  application.ini, default "auto".)

    # ---- BREACH / CRIME mitigation ----------------------------------
    # No compression of secret-bearing dynamic HTML. Static assets re-enable
    # gzip in their own location below.
    gzip      off;
    # brotli  off;   # if your build has it

    # ---- security headers -------------------------------------------
    add_header X-Frame-Options            "DENY"                              always;
    add_header X-Content-Type-Options     "nosniff"                           always;
    add_header X-XSS-Protection           "0"                                 always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy         "accelerometer=(), camera=(), geolocation=(), gyroscope=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin"                       always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; form-action 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;

    # ---- request limits ---------------------------------------------
    client_max_body_size  16m;
    client_body_timeout   30s;
    client_header_timeout 15s;
    send_timeout          30s;
    large_client_header_buffers 4 16k;

    # ---- FastCGI defaults (server scope -> inherited by every php
    #      location below; each just adds its own `fastcgi_pass`) --------
    fastcgi_index        index.php;
    include              fastcgi_params;
    fastcgi_param        SCRIPT_FILENAME  $document_root$fastcgi_script_name;
    fastcgi_param        APPLICATION_ENV  production;   # selects [section] in application.ini
    fastcgi_param        HTTPS            on;           # TLS -> secure cookies / URLs
    fastcgi_hide_header  X-Powered-By;
    fastcgi_read_timeout 130s;                          # > FPM max_execution_time
    fastcgi_buffers      16 16k;
    fastcgi_buffer_size  32k;

    # =================================================================
    #  POSITIVE-SECURITY GATE  (evaluated before anything is served)
    # =================================================================
    # Order matters: cheapest, broadest denials first. Each returns early.

    # Bad / probing user agents -> 444 (drop connection, no response).
    if ($vimb_bad_ua)     { return 444; }

    # Disallowed HTTP method -> 405.
    if ($vimb_bad_method) { return 405; }

    # ACME first (so the route map below can't 404 it).
    location ^~ /.well-known/ { allow all; }

    # Unknown route -> 404. Unknown GET arg name -> 403. We can't put `if`
    # inside `location` cleanly for both, so gate at server scope here:
    if ($vimb_bad_route)  { return 404; }
    if ($vimb_bad_args)   { return 403; }

    # ---- deny dotfiles + project internals (defence in depth) -------
    location ~ /\.(?!well-known) { deny all; }
    location ~* ^/(?:application|library|doctrine2|vendor|bin|var|tests)/ { deny all; }
    location ~* \.(?:ini|dist|vagrant|sh|sql|log|orig|bak|swp|dcm\.xml|md)$ { deny all; }

    # ---- FPM status/ping: localhost only ----------------------------
    location = /fpm-status {
        allow 127.0.0.1; allow ::1; deny all;
        fastcgi_pass unix:/run/php/vimbadmin-fpm.sock;
    }
    location = /fpm-ping {
        allow 127.0.0.1; allow ::1; deny all;
        fastcgi_pass unix:/run/php/vimbadmin-fpm.sock;
    }

    # ---- static assets: cacheable, compressible (no secrets) --------
    location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|map)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        gzip on;
        gzip_types text/css application/javascript image/svg+xml;
        try_files $uri =404;
    }

    # ---- MCP adapter: bearer-auth JSON-RPC endpoint -----------------
    # PRIMARY network barrier -- only these IPs reach PHP at all. The app
    # then enforces the bearer token + per-token IP allowlist + scope.
    # Bypasses the login limiter; bypasses the arg-name map (POST JSON body).
    location = /mcp {
        allow 127.0.0.1;
        allow ::1;
        # allow 10.0.0.0/8;          # <-- your MCP client IP(s)/CIDR(s)
        deny  all;

        # NB: a location with its own fastcgi_param does NOT inherit the
        # server-scope ones, so re-include them here. Run index.php but keep
        # SCRIPT_NAME=/index.php so ZF1 baseUrl detection leaves REQUEST_URI=/mcp
        # as the path (otherwise it routes to the default controller).
        include       fastcgi_params;
        fastcgi_param APPLICATION_ENV  production;
        fastcgi_param HTTPS            on;
        fastcgi_param SCRIPT_FILENAME  $document_root/index.php;
        fastcgi_param SCRIPT_NAME      /index.php;
        fastcgi_hide_header X-Powered-By;
        fastcgi_pass  unix:/run/php/vimbadmin-fpm.sock;
    }

    # ---- front controller (index.php) -------------------------------
    # Do NOT rate-limit here: the app funnels EVERY dynamic request through
    # index.php, so a limit_req throttles normal browsing (and behind a proxy
    # it counts the single proxy IP -> instant 503). Login brute-force is
    # handled in the app per-IP (see [bruteforce] in application.ini).
    location = /index.php {
        fastcgi_pass unix:/run/php/vimbadmin-fpm.sock;
    }

    # ---- front controller -------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/vimbadmin-fpm.sock;
    }
}

# =====================================================================
#  Angie / nginx vhost for ViMbAdmin  --  hardened
# =====================================================================
#
#  Install as /etc/angie/sites-available/vimbadmin and symlink into
#  sites-enabled/ (or drop in http.d/). Pairs with the FPM pool in
#  contrib/php-fpm/vimbadmin.conf (socket: /run/php/vimbadmin-fpm.sock).
#
#  Assumes the ViMbAdmin checkout lives at /opt/vimbadmin with the public
#  docroot at /opt/vimbadmin/public.
# =====================================================================

# ---- rate-limit zone for the login endpoint (brute-force throttle) ---
# Put this in the http{} context (here for reference; move if your tree
# disallows http-level directives in vhost files).
limit_req_zone $binary_remote_addr zone=vimbadmin_login:10m rate=5r/m;

# ---- HTTP -> HTTPS redirect -----------------------------------------
server {
    listen      80;
    listen      [::]:80;
    server_name vimbadmin.example.com;

    # ACME http-01 challenge still served over plain HTTP.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS ----------------------------------------------------------
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    # http3 on; listen 443 quic reuseport;   # optional, if your build has it
    server_name vimbadmin.example.com;

    root  /opt/vimbadmin/public;
    index index.php;

    # ---- TLS --------------------------------------------------------
    ssl_certificate     /etc/ssl/vimbadmin/fullchain.pem;
    ssl_certificate_key /etc/ssl/vimbadmin/privkey.pem;
    # include snippets/ssl-hardening.conf;     # if you ship the shared snippet
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305";
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:vimb_ssl:10m;
    ssl_session_tickets off;

    # ---- BREACH / CRIME mitigation ----------------------------------
    # BREACH exploits HTTP-level compression of responses that mix a secret
    # (CSRF token, session-bound data) with attacker-influenced reflected
    # input. The robust fix is to NOT compress dynamic HTML. We therefore
    # disable gzip globally here and only re-enable it for static, secretless
    # assets in the static `location` below. (TLS-level compression / CRIME
    # is already off in modern OpenSSL builds.)
    gzip      off;
    # If your build has Brotli, make sure it's off for dynamic responses too:
    # brotli   off;

    # ---- security headers -------------------------------------------
    add_header X-Frame-Options           "DENY"                              always;
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header X-XSS-Protection          "0"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy        "accelerometer=(), camera=(), geolocation=(), gyroscope=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin"                      always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content-Security-Policy. ViMbAdmin's bundled templates use inline
    # <script>/<style> and inline event handlers, so 'unsafe-inline' is
    # required for the app to function. Everything else is locked to self.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; form-action 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;

    # ---- upload size (matches FPM post_max_size) --------------------
    client_max_body_size 16m;
    client_body_timeout  30s;
    client_header_timeout 15s;
    send_timeout         30s;

    # ---- deny dotfiles + sensitive project paths --------------------
    location ~ /\.(?!well-known) { deny all; }

    # Never serve app internals even if docroot is misconfigured.
    location ~* ^/(?:application|library|doctrine2|vendor|bin|var|tests)/ {
        deny all;
    }
    location ~* \.(?:ini|dist|vagrant|sh|sql|log|orig|bak|swp|dcm\.xml|md)$ {
        deny all;
    }

    # ---- FPM status/ping: localhost only ----------------------------
    location = /fpm-status {
        allow 127.0.0.1;
        allow ::1;
        deny  all;
        fastcgi_pass unix:/run/php/vimbadmin-fpm.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
    location = /fpm-ping {
        allow 127.0.0.1;
        allow ::1;
        deny  all;
        fastcgi_pass unix:/run/php/vimbadmin-fpm.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # ---- static assets: cacheable, compressible (no secrets here) ---
    location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        gzip on;
        gzip_types text/css application/javascript image/svg+xml;
        try_files $uri =404;
    }

    # ---- brute-force throttle on the login POST ---------------------
    location = /index.php {
        # only throttle the auth path; burst lets a couple of fat-fingers through
        limit_req zone=vimbadmin_login burst=3 nodelay;
        include vimbadmin_fastcgi.inc;
    }

    # ---- front controller -------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include vimbadmin_fastcgi.inc;
    }
}

# ---------------------------------------------------------------------
# Save the block below as a separate file referenced above
# (e.g. /etc/angie/vimbadmin_fastcgi.inc) OR inline it into each php
# location. Kept here as a comment to document the exact FastCGI params.
# ---------------------------------------------------------------------

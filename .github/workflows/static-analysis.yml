name: Static analysis

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phpstan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    # PHPStan level 1 is clean and now BLOCKING — a regression fails the build.
    # (ZF1 is gone, so the old "advisory until a baseline lands" exemption no
    # longer applies. Raise the level incrementally in follow-up PRs.)
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          extensions: ctype, dom, gd, gettext, iconv, intl, json, mbstring, pdo, pdo_mysql, sodium
          tools: composer:v2, phpstan

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      # Proxies are gitignored + built at image time; generate them here so this
      # job also verifies bin/generate-proxies.php keeps working (no DB needed).
      - name: Generate Doctrine proxies
        run: php bin/generate-proxies.php

      - name: Run PHPStan
        run: phpstan analyse --no-progress --error-format=github

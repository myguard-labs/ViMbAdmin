; =====================================================================
;  PHP-FPM pool for ViMbAdmin  --  optimised + hardened, PHP 8.4+
; =====================================================================
;
;  Drop in as /etc/php/<ver>/fpm/pool.d/vimbadmin.conf (and remove or
;  rename the distro's default www.conf, or change [vimbadmin] -> [www]).
;
;  Required PHP extensions: pdo_mysql, mbstring, intl, gettext, dom, ctype,
;  iconv, json, and SODIUM (the 2FA TOTP secrets are encrypted with it).
;
;  Pairs with:
;    - contrib/snuffleupagus/vimbadmin-strict.list  (the SP rulebook)
;    - contrib/angie/vimbadmin.conf                 (the Angie/nginx vhost)
;
;  IMPORTANT: PHP's native `disable_functions` is left EMPTY on purpose --
;  Snuffleupagus manages the dangerous-function policy instead, and loading
;  SP hooks on a function PHP has already disabled SIGSEGVs the worker.
; =====================================================================

[vimbadmin]

; ---- process user / group -------------------------------------------
; Run as an unprivileged, ViMbAdmin-only account. The web server talks to
; the socket via the shared `www-data` group; nothing runs as root.
user  = phpfpm
group = phpfpm

; ---- listener (unix socket; faster + not network-exposed) -----------
listen       = /run/php/vimbadmin-fpm.sock
listen.owner = phpfpm
listen.group = www-data
listen.mode  = 0660

; ---- process manager ------------------------------------------------
; `dynamic` suits a low-traffic admin panel. Bump max_children on a busy
; multi-admin install (each child ~= memory_limit at worst).
pm                   = dynamic
pm.max_children      = 8
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests      = 500          ; recycle workers to bound leaks

; ---- health / ops ---------------------------------------------------
pm.status_path                 = /fpm-status   ; restrict in the vhost!
ping.path                      = /fpm-ping
request_terminate_timeout      = 130s          ; > max_execution_time
request_slowlog_timeout        = 15s
slowlog                        = /var/log/php-fpm/vimbadmin-slow.log
catch_workers_output           = yes
decorate_workers_output        = no

; ---- environment ----------------------------------------------------
; Do NOT inherit the host environment into PHP (defence in depth).
clear_env = yes

; Only ever execute *.php (block .phar, .php3, double-extension tricks).
security.limit_extensions = .php

; ---- PHP runtime hardening (php_admin_* = cannot be overridden) ------
php_admin_value[expose_php]            = Off
php_admin_value[allow_url_fopen]       = On     ; ViMbAdmin version check
php_admin_value[allow_url_include]     = Off
php_admin_value[cgi.fix_pathinfo]      = 0
php_admin_value[zend.exception_ignore_args] = 1
php_admin_value[zend.assertions]       = -1
php_admin_flag[mail.add_x_header]      = Off

; open_basedir confines the pool to the app + its runtime dirs.
php_admin_value[open_basedir] = /opt/vimbadmin/:/tmp/:/run/php/:/usr/share/php/

; Native disable_functions intentionally EMPTY (Snuffleupagus owns this).
php_admin_value[disable_functions] =

; ---- sessions -------------------------------------------------------
php_admin_value[session.use_strict_mode]      = 1
php_admin_value[session.use_only_cookies]     = 1
php_admin_value[session.cookie_httponly]      = 1
php_admin_value[session.cookie_secure]        = 1     ; set 0 only for plain-HTTP testing
php_admin_value[session.cookie_samesite]      = Lax   ; Lax: keeps top-level GET navigation working
php_admin_value[session.sid_length]           = 48
php_admin_value[session.sid_bits_per_character] = 6
php_admin_value[session.gc_maxlifetime]       = 3600

; ---- errors / logging -----------------------------------------------
php_admin_flag[log_errors]            = On
php_admin_flag[display_errors]        = Off
php_admin_flag[display_startup_errors]= Off
php_admin_value[error_log]            = /var/log/php-fpm/vimbadmin-error.log

; ---- limits ---------------------------------------------------------
php_admin_value[memory_limit]        = 256M
php_admin_value[max_execution_time]  = 120
php_admin_value[max_input_time]      = 120
php_admin_value[max_input_vars]      = 5000
php_admin_value[upload_max_filesize] = 16M
php_admin_value[post_max_size]       = 16M
php_admin_value[max_file_uploads]    = 20

; ---- OPcache (perf) -------------------------------------------------
php_admin_flag[opcache.enable]                 = 1
php_admin_value[opcache.memory_consumption]    = 128
php_admin_value[opcache.max_accelerated_files] = 12000
php_admin_value[opcache.validate_timestamps]   = 1     ; set 0 in prod after deploy for max speed
php_admin_value[opcache.revalidate_freq]       = 60

; ---- Snuffleupagus --------------------------------------------------
; The extension itself is loaded by the distro package (it drops a
; mods-available/snuffleupagus.ini that phpenmod symlinks into conf.d) --
; extensions can't be loaded per-pool, so that part stays at the PHP level.
; Here we only point this pool at the audited ViMbAdmin rulebook. Copy
; contrib/snuffleupagus/vimbadmin-strict.list to the path below and inject a UNIQUE
; secret_key per host:
;
;   php -r 'echo bin2hex(random_bytes(32)), "\n";'
;   sed -i "s/CHANGE-ME-PER-DEPLOYMENT-0*/<that value>/" \
;       /etc/php/8.5/php-snuffleupagus/vimbadmin-strict.list
php_admin_value[sp.configuration_file] = /etc/php/8.5/php-snuffleupagus/vimbadmin-strict.list
; Fail CLOSED: if the SP rulebook is malformed, refuse to start the worker
; rather than silently running with protection OFF. This is SP's default, but
; set it explicitly so a future default change can't quietly open us up.
php_admin_value[sp.allow_broken_configuration] = Off

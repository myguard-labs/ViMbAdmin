# =============================================================================
#  Mail compression — zstd level 9 on save (2.4 mail_compress plugin).
#
#  Compresses mail ON SAVE so `doveadm backup` writes zstd-compressed maildirs
#  to /backups (and live mail shrinks too). NOTE: this only affects mail
#  written AFTER it is enabled — pre-existing mail stays in whatever form it
#  was saved; reads work transparently for a mix of compressed/uncompressed.
#  The zlib plugin was superseded by mail_compress in 2.4 (use _write_method).
#
#  WARNING: once any mail is written compressed, mail_compress must stay
#  enabled FOREVER (removing it makes those messages unreadable).
#  Level 9 = higher CPU once at save; decompress speed is level-independent.
# =============================================================================

mail_plugins {
  mail_compress = yes
}

# Compress mails on save (not just read transparently):
mail_compress_write_method = zstd

# zstd level (1-22). 9 = good ratio; >9 diminishing returns on small mail.
compress_zstd_level = 9

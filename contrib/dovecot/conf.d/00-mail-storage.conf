# Mail storage path — config-owned, NOT DB-owned (Dovecot >= 2.4).
#
# ViMbAdmin stores a per-mailbox homedir/maildir string in the `mailbox`
# table. If the userdb query SELECTs those columns (`homedir AS home`,
# `maildir AS mail`, and the passdb prefetch `userdb_home`/`userdb_mail`),
# the DB value WINS per row and shadows mail_path below — so changing the
# storage root then needs a DB UPDATE on every row + a file move.
#
# To keep the path in ONE place, DROP the homedir/maildir columns from the
# userdb (and passdb prefetch) queries — keep quota/uid/gid — and let these
# settings derive the path. Change the root by editing this one file.
#
#   passdb sql {
#     query = SELECT username AS user, password AS password, \
#               concat('*:bytes=', quota) AS userdb_quota_rule, \
#               uid AS userdb_uid, gid AS userdb_gid \
#             FROM mailbox WHERE username = '%{user|lower}' AND active = '1' \
#               AND ( access_restriction = 'ALL' \
#                     OR LOCATE('%{protocol|upper}', access_restriction) > 0 )
#   }
#   userdb prefetch { }
#   userdb sql {
#     query = SELECT concat('*:bytes=', quota) AS quota_rule, uid, gid \
#             FROM mailbox WHERE username = '%{user|lower}'
#     iterate_query = SELECT username AS user FROM mailbox
#   }
#
# With the columns gone, the path comes from here (vars: %{user} = full
# address). mail_inbox_path must equal mail_path so INBOX maps to the
# maildir root (see project-dovecot-hardened-docker lesson, item 8).
#
# GATE before dropping columns: the existing DB rows must already point at
# the same root these settings produce, otherwise mail "moves". Verify with
# `doveadm user <addr>` — home/mail_path must already match.

mail_driver       = maildir
mail_path         = /opt/myguard/dovecot/maildir/%{user}
mail_inbox_path   = /opt/myguard/dovecot/maildir/%{user}

# Also set ViMbAdmin application.ini `defaults.mailbox.{homedir,maildir}` to
# BLANK so newly created mailboxes don't write a stale root into the table.
